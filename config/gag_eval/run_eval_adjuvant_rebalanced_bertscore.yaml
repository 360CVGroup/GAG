workdir: .
data_path: outputs/adjuvant_domain/rebalanced_bertscore/background_embeddings/adjuvant_test_backgrounds.pkl
output_file_path: outputs/adjuvant_domain/rebalanced_bertscore/eval/adjuvant_gag_answers.jsonl
model_name_or_path: outputs/adjuvant_domain/rebalanced_bertscore/stageII/adjuvant_gag/last/full_weight
eval_batch_size: 4
chat_format: qwen3
enable_progress_bar: true
layer_keys:
  - last
  - minus2
  - minus4
  - minus6
num_memory_slots: 4
slot_pooling: segment_softmax
slot_pooling_temperature: 1.0
instruction_text: |
  You are an expert in immunology and adjuvant, with a strong background in vaccine development. Your research and practice in this field have equipped you with a deep understanding of the mechanisms of immune response and how to optimize vaccine efficacy through adjuvants. You excel in providing concise, precise, and professional responses to questions related to adjuvants and immunology.
request_text: |
  Please answer the following question based on the knowledge provided.
do_sample_big: false
max_new_tokens: 640
temperature: 0.7
top_p: 0.8
top_k: 20
